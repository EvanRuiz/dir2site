name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve tag and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! echo "$VERSION" | grep -qP '^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$'; then
            echo "Invalid version: $VERSION — tag must be v{major}.{minor}.{patch}[-prerelease]"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            profile: Windows-x64
            publish-dir: bin/x64/Release/net10.0/win-x64/publish
          - os: windows-latest
            rid: win-arm64
            profile: Windows-ARM64
            publish-dir: bin/ARM64/Release/net10.0/win-arm64/publish
          - os: macos-latest
            rid: osx-arm64
            profile: macOS-ARM64
            publish-dir: bin/ARM64/Release/net10.0/osx-arm64/publish
            app-bundle: bin/ARM64/Release/net10.0/osx-arm64/Dir2Site.app
          - os: macos-latest
            rid: osx-x64
            profile: macOS-x64
            publish-dir: bin/x64/Release/net10.0/osx-x64/publish
            app-bundle: bin/x64/Release/net10.0/osx-x64/Dir2Site.app
          - os: ubuntu-latest
            rid: linux-x64
            profile: linux-x64
            publish-dir: bin/x64/Release/net10.0/linux-x64/publish

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        env:
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: dotnet publish /p:PublishProfile=${{ matrix.profile }} -c Release

      - name: Restore tools
        run: dotnet tool restore

      - name: Pack with Velopack
        env:
          DOTNET_ROLL_FORWARD: LatestMajor
        run: >
          dotnet vpk pack
          --packId dir2site
          --packVersion ${{ needs.create-release.outputs.version }}
          --packDir ${{ matrix.app-bundle || matrix.publish-dir }}
          --outputDir releases/${{ matrix.rid }}
          --runtime ${{ matrix.rid }}
          --channel ${{ matrix.rid }}

      - name: Create DMG (macOS only)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install create-dmg
          mkdir -p dmg-source
          unzip "releases/${{ matrix.rid }}/"*Portable.zip -d dmg-source/
          # Velopack outputs the app using the lowercase packId
          APP_NAME=$(ls dmg-source/ | grep -i "\.app$" | head -1)
          # Sign after Velopack unpacks — signing before pack breaks the
          # signature because Velopack modifies the bundle contents.
          codesign --deep --force --sign - "dmg-source/${APP_NAME}"
          # Detach any stale volume from a parallel job on the same host
          hdiutil detach "/Volumes/Dir2Site" 2>/dev/null || true
          create-dmg \
            --volname "Dir2Site" \
            --volicon "Assets/app/dir2site-icon.icns" \
            --window-pos 200 120 \
            --window-size 540 360 \
            --icon-size 128 \
            --icon "${APP_NAME}" 150 175 \
            --hide-extension "${APP_NAME}" \
            --app-drop-link 390 175 \
            "releases/${{ matrix.rid }}/Dir2Site-${{ needs.create-release.outputs.version }}-${{ matrix.rid }}.dmg" \
            "dmg-source/"

      - name: Upload release assets
        run: gh release upload "${{ needs.create-release.outputs.tag }}" releases/${{ matrix.rid }}/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
