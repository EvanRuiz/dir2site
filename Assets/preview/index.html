<html>
<head>
    <style>
        .overlay {
            border: 2px solid rgba(0, 0, 0, 0.9);
            border-radius: 50%;
            background-color: transparent;
            color: white;
            white-space: nowrap;
            text-shadow: 0px 1px 2px rgb(0 0 0 / 80%);

            opacity: 0.1;
            transition: opacity 0.3s ease-in-out;
        }
        .overlay:hover {
            opacity: 1;
        }
        .overlay-label {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0px 2px 4px rgb(0 0 0 / 80%);
            background-color: rgba(0, 0, 0, 0.5);
            box-shadow: 0px 2px 4px rgb(0 0 0 / 80%);
            border-radius: 5px;
            padding: 5px 10px;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out, visibility 0.3s ease-in-out;
        }
    </style>
     <script>
         const LABEL_SIZE = 36;
         
         let overlaysData = [];
         let tileSources = ["tiles/mydz.dzi"];

         <!-- OVERLAYS OVERRIDE -->

         <!-- TILES OVERRIDE -->
     </script>
     <script src="js/openseadragon/openseadragon.min.js"></script>
     <script src="js/fittext.js"></script>
     <script>

         function overlaysFitText() {
             const overlayElements = document.querySelectorAll('.overlay');
             overlayElements.forEach(function (overlay) {
                 window.fitText(overlay, 1.2);
             });
         };
         
         function loadOverlays(overlays) {
             let count = 0;
             
             overlays.forEach(function (overlay) {
                 console.log(overlay);
                 overlay.id = "overlay-" + count;
                 overlay.className = "overlay";
                 
                 // Overlay
                 const overlayDiv = document.createElement("button");
                 overlayDiv.setAttribute("id", overlay.id);
                 overlayDiv.classList.add("overlay");
                 overlayDiv.innerHTML = "";
                 document.body.append(overlayDiv);
                 console.log(overlayDiv);
                 
                 // Label
                 const labelDiv = document.createElement("div");
                 labelDiv.setAttribute("id", overlay.id + "-label");
                 labelDiv.classList.add("overlay-label");
                 labelDiv.innerHTML = overlay.caption;
                 document.body.append(labelDiv);
                 
                 // Event listeners to show/hide label
                 overlayDiv.addEventListener('mouseenter', function() {
                     labelDiv.style.opacity = '1';
                     labelDiv.style.visibility = 'visible';
                 });
                 
                 overlayDiv.addEventListener('mouseleave', function() {
                     labelDiv.style.opacity = '0';
                     labelDiv.style.visibility = 'hidden';
                 });
                 
                 count++;
             });
             
             console.log(overlays);
             return overlays;
         }

         function updateLabelLocationsAndZoom(viewer) {
             const zoom = viewer.viewport.getZoom(true);
             document.querySelectorAll('.overlay').forEach(function (overlay) {
                 const label = document.getElementById(overlay.id + "-label");
                 if (label) {
                     const rect = overlay.getBoundingClientRect();
                     label.style.left = (rect.left + rect.width / 2) + "px";
                     label.style.top = (rect.bottom + 5) + "px";
                     label.style.transform = "translateX(-50%)";
                     label.style.fontSize = zoom*LABEL_SIZE + "px";
                 }
             });
         }

         function loadOpenSeadragon(overlays) {
             const viewer = OpenSeadragon({
                 id: "openseadragon-view",
                 prefixUrl: "js/openseadragon/images/",
                 tileSources: tileSources,
                 overlays: overlays
             });

             viewer.addHandler('zoom', function(event) {
                 updateLabelLocationsAndZoom(viewer);
             });

             viewer.addHandler('open', function() {
                 updateLabelLocationsAndZoom(viewer);
             });

             viewer.addHandler("animation", function(event) {
                 updateLabelLocationsAndZoom(viewer);
             });

             viewer.addHandler("animation-finish", function(event) {
                 updateLabelLocationsAndZoom(viewer);
             });
         }
     </script>
</head>
<body>
    <div id="openseadragon-view">
        <script>
            const overlays = loadOverlays(overlaysData);
            loadOpenSeadragon(overlays);
        </script>
        <noscript>
            <p>OpenSeadragon is not available unless JavaScript is enabled.</p>
        </noscript>
    </div>
</body>
</html>
