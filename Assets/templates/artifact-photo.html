<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | html.escape }}{{ if artifact.caption != "" }} &mdash; {{ artifact.caption | html.escape }}{{ end }}</title>
  {{ include 'opengraph' }}
  <link rel="stylesheet" href="{{ prefix }}js/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="{{ prefix }}css/site.css">
</head>
<body>
  {{ include 'header' }}

  <div id="osd-viewer"></div>

  <div class="container artifact-meta">
    <div class="d-flex align-items-center gap-2 mb-1">
      <h4 class="mb-0">{{ artifact.caption | html.escape }}</h4>
      <span class="badge badge-type text-white">{{ artifact.badge | html.escape }}</span>
    </div>
    {{ if artifact.credit != "" }}<p class="text-muted small mb-1">{{ artifact.credit | html.escape }}</p>{{ end }}
    {{ if artifact.date != "" }}<p class="text-muted small mb-1">{{ artifact.date | html.escape }}</p>{{ end }}
  </div>

  {{ include 'footer' }}

  <script src="{{ prefix }}js/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="{{ prefix }}js/openseadragon/openseadragon.min.js"></script>
  <script>
    window.addEventListener('load', function () {
      OpenSeadragon({
        id: "osd-viewer",
        prefixUrl: "{{ prefix }}js/openseadragon/images/",
        tileSources: { type: "image", url: "{{ artifact.image_src }}" },
        showNavigationControl: true,
        gestureSettingsMouse: { scrollToZoom: true },
        constrainDuringPan: true,
        minZoomImageRatio: 0.8,
        maxZoomPixelRatio: 2,
        showNavigator: true,
        navigatorSizeRatio: 0.25
      });
    });
  </script>
</body>
</html>
